services:
  - type: web
    name: clawd-pfp-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLOUDFLARE_ACCOUNT_ID
        sync: false
      - key: CLOUDFLARE_ACCESS_KEY_ID
        sync: false
      - key: CLOUDFLARE_SECRET_ACCESS_KEY
        sync: false
      - key: CLOUDFLARE_R2_BUCKET
        value: clawd
      - key: CLOUDFLARE_R2_PUBLIC_URL
        value: https://pub-9a12d2869ea54d26bc39b55ba9a84e9a.r2.dev
      - key: NFT_SYMBOL
        value: CLAWD
      - key: APP_URL
        value: https://x402.wtf
      - key: ALLOWED_ORIGINS
        value: https://x402.wtf,https://clawd-pfp-avatar-generator.vercel.app
